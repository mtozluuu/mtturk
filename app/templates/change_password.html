<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <title>{{ t("password.change") }}</title>
    <style>
        body { font-family: system-ui, Arial, sans-serif; background: #f8f9fa; margin: 0; }
        .container {
            max-width: 410px;
            margin: 48px auto;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(60,60,60,0.08);
            padding: 32px 32px 24px 32px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 16px;
            color: #20242b;
            letter-spacing: .5px;
        }
        label {
            font-weight: 500;
            color: #282828;
            display: block;
            margin-bottom: 4px;
            margin-top: 18px;
        }
        input[type="password"] {
            width: 100%;
            font-size: 1.07rem;
            border-radius: 6px;
            border: 1.2px solid #c4c9ce;
            padding: 8px 12px;
            margin-bottom: 2px;
            box-sizing: border-box;
            background: #fbfcfd;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: #297ffc;
            background: #f0f6ff;
        }
        .msg { margin-bottom: 14px; }
        .msg.error { color: #b1001b; background: #ffe5e8; border-radius:5px; padding: 8px 10px;}
        .msg.success { color: #066f10; background: #eafaf1; border-radius:5px; padding: 8px 10px;}
        button {
            margin-top: 22px;
            font-size: 1.1rem;
            background: #297ffc;
            color: white;
            border: none;
            border-radius: 7px;
            padding: 10px 30px;
            cursor: pointer;
            font-weight: 500;
            letter-spacing: .03em;
            box-shadow: 0 2px 4px rgba(60,60,60,0.07);
            transition: background .15s;
        }
        button:active {
            background: #1359b5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ t("password.change") }}</h1>
        {% if error %}
            <div class="msg error">{{ error }}</div>
        {% endif %}
        {% if success %}
            <div class="msg success">{{ success }}</div>
        {% endif %}
        <form method="post" action="/change-password" autocomplete="off">
            <label for="current_password">{{ t("password.current") }}</label>
            <input type="password" name="current_password" id="current_password" required>
            
            <label for="new_password">{{ t("password.new") }}</label>
            <input type="password" name="new_password" id="new_password" required>
            
            <label for="confirm_password">{{ t("password.confirm") }}</label>
            <input type="password" name="confirm_password" id="confirm_password" required>
            
            <button type="submit">{{ t("password.button") }}</button>
        </form>
    </div>
</body>
</html>
